<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>접근 거부 - HanSung</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            min-height: 100vh;
        }
        .error-card {
            max-width: 520px;
            margin: 120px auto 0;
            border: none;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }
        .error-title {
            color: #e94560;
            font-weight: 800;
        }
        footer {
            margin: 40px 15px 14px;
            padding-top: 12px;
            border-top: 1px solid #dee2e6;
            text-align: center;
            color: #6c757d;
            font-size: 12px;
        }
        footer p {
            margin: 0;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card error-card">
        <div class="card-body text-center p-5">
            <h2 class="error-title mb-3">403 Access Denied</h2>
            <p class="text-muted mb-4">
                이 페이지에 접근할 권한이 없습니다.
            </p>
            <a th:href="@{/home}" class="btn btn-primary px-4">홈으로 이동</a>
            <a th:href="@{/products}" class="btn btn-outline-secondary px-4 ms-2">상품 목록</a>
        </div>
    </div>
</div>

<footer>
    <p th:text="${'실습 수행 : ' + #temporals.format(#temporals.createNow(), 'yyyy-MM-dd HH:mm:ss') + '  |  학번: 2371195  |  성명: 서유진'}"></p>
</footer>

</body>
</html>
